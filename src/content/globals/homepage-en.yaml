workSectionHeading: Selected work
digitalLabel: Digital
digitalHeading: Tools for communities to grow
digitalBody: >-
  Websites, platforms, digital services, UX/UI design. Building the tools
  communities and organisations need to organise and grow.
digitalExamples: 'e.g. Massvis platform, Klondyke Farms website'
physicalLabel: Physical
physicalHeading: Spaces that people want to be in
physicalBody: >-
  Architecture, spatial design, co-building workshops. Designing and constructing
  spaces that people want to be in.
physicalExamples: 'e.g. DIT Egnahem, Rewilding Sweden pavilion'
socialLabel: Social
socialHeading: Bringing communities together
socialBody: >-
  Co-design facilitation, workshops, placemaking consulting. Bringing people
  together to shape the places they live in.
socialExamples: 'e.g. Umeå Together, Kajeka student housing'
studioHeading: An architecture studio that builds differently.
studioBody1: >-
  Founded in 2022 by Kasimir and Karina while still studying — as a vessel for
  their creative, research, and community interests. The name means three things:
  participatory design, the French concept diagram that drives an architectural
  idea, and a refusal to take architecture too seriously.
studioQuote: Citizens are the experts of place.
studioBody2: >-
  They work holistically — a single project might combine architecture, workshop
  facilitation, branding, and a website. The studio operates as both a practice
  and a venture studio, incubating its own initiatives alongside client work.
studioPhotoAlt: Karina and Kasimir — founders of Parti Design
venturesTeaser: We don't just respond to briefs — we initiate.
venturesBody: >-
  Alongside client work, Parti Design incubates its own projects: initiatives we
  believe in and build ourselves.
byggemenskapHeading: Building homes together.
byggemenskapBody: >-
  Byggemenskap — community self-build housing — is one of the most powerful tools
  for affordable, community-rooted housing. Parti Design offers end-to-end
  support: from forming the organisation to designing and co-building the home.
byggemenskapCta: Talk to us about byggemenskap
closingHeading: Let's build something together.
closingBody: Whether you have a brief, an idea, or just a question — reach out.
closingCta: Start a conversation
