heroHeadline: Nya sätt att organisera och bygga tillsammans.
heroSubstatement: >-
  Parti Design är ett multidisciplinärt arkitektur- och designstudio. Vi
  utvecklar regenerativa platser genom digitala, fysiska och sociala system.
heroCta: Se våra projekt
heroCtaContact: Kontakta oss
marqueeTerms:
  - Arkitektur
  - Sambyggnad
  - Digital design
  - Placemaking
  - Facilitering
  - Regenerativa platser
  - WikiHouse
  - Byggemenskap
workSectionHeading: Utvalda projekt
digitalLabel: Digitalt
digitalHeading: Verktyg för att gemenskaper ska växa
digitalBody: >-
  Webbplatser, plattformar, digitala tjänster, UX/UI-design. Vi bygger de
  verktyg som gemenskaper och organisationer behöver för att organisera sig och
  växa.
digitalExamples: 't.ex. Massvis-plattformen, Klondyke Farms webbplats'
physicalLabel: Fysiskt
physicalHeading: Rum som människor vill vistas i
physicalBody: >-
  Arkitektur, rumsdesign, sambyggnadsworkshops. Vi designar och konstruerar rum
  som människor vill vistas i.
physicalExamples: 't.ex. DIT Egnahem, Rewilding Sweden-paviljongen'
socialLabel: Socialt
socialHeading: Att samla gemenskaper
socialBody: >-
  Samdesignfacilitering, workshops, platsmakarrådgivning. Vi samlar människor
  för att forma de platser de lever i.
socialExamples: 't.ex. Umeå Tillsammans, Kajeka studentbostäder'
studioHeading: Ett arkitekturstudio som bygger annorlunda.
studioBody1: >-
  Grundat 2022 av Kasimir och Karina medan de fortfarande studerade — som ett
  kärl för deras kreativa, akademiska och samhällsintressen. Namnet betyder tre
  saker: deltagande design, det franska konceptdiagrammet som driver en
  arkitekturidé, och en vägran att ta arkitektur för seriöst.
studioQuote: Medborgarna är platsens experter.
studioBody2: >-
  De arbetar holistiskt — ett enda projekt kan kombinera arkitektur,
  workshopfacilitering, varumärkesbyggande och en webbplats. Studion fungerar
  både som praktik och som ett venturestudio som inkuberar egna initiativ vid
  sidan av kundarbete.
studioPhotoAlt: Karina och Kasimir — grundarna av Parti Design
venturesTeaser: Vi svarar inte bara på uppdrag — vi initierar.
venturesBody: >-
  Vid sidan av kundarbete inkuberar Parti Design egna projekt: initiativ vi tror
  på och bygger själva.
byggemenskapHeading: Att bygga hem tillsammans.
byggemenskapBody: >-
  Byggemenskap — gemensamt självbyggnadsboende — är ett av de kraftfullaste
  verktygen för prisvärda, gemenskapsförankrade bostäder. Parti Design erbjuder
  helhetsstöd: från att bilda organisationen till att designa och sambygga hemmet.
byggemenskapCta: Prata med oss om byggemenskap
closingHeading: Låt oss bygga något tillsammans.
closingBody: Oavsett om du har ett uppdrag, en idé eller bara en fråga — hör av dig.
closingCta: Starta ett samtal
contactEmail: kasimir@parti.design
